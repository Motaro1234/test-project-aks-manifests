apiVersion: apps/v1

kind: Deployment

metadata:
  name: webapp

  namespace: webapp

spec:

  replicas: 5

  selector:

    matchLabels:

      app: webapp

  template:

    metadata:

      labels:

        app: webapp

    spec:

      containers:

      - name: webapp

        image: acrakspoc01.azurecr.io/webapp:8e6d18d35fbfa246512d8902453d499644f679de

        imagePullPolicy: Always

        ports:

        - containerPort: 3000