apiVersion: apps/v1

kind: Deployment

metadata:
  name: webapp

  namespace: webapp

spec:

  replicas: 5

  selector:

    matchLabels:

      app: webapp

  template:

    metadata:

      labels:

        app: webapp

    spec:

      containers:

      - name: webapp

        image: acrakspoc01.azurecr.io/webapp:5acab510e48bf8dab2e528ec3201625650203d5f

        imagePullPolicy: Always

        ports:

        - containerPort: 3000